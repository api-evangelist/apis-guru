aid: apis-guru
name: APIs.guru
description: >-
  APIs.guru is an open source, community-driven directory of public REST API
  definitions in OpenAPI 2.0/3.x format, described as the Wikipedia for Web
  APIs. The project searches for public API definitions, converts various
  formats to OpenAPI 3.0, corrects errors in approximately 80% of definitions,
  and enriches entries with logos, categories, and metadata. It catalogs over
  2,500 API descriptions with 100,000+ endpoints, updating definitions weekly
  from original sources. The platform is licensed under CC0-1.0 for contributed
  definitions and welcomes community contributions through GitHub.
