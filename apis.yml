apis:
  - aid: apis-guru:apis-guru-api
    name: APIs.guru REST API
    description: >-
      The APIs.guru REST API provides programmatic access to the directory of
      public API definitions, allowing developers to search, browse, and
      retrieve OpenAPI specifications from the catalog. The API is public and
      requires no authentication. It provides endpoints to list all APIs, fetch
      metrics, retrieve provider lists, and access specific API version details
      including direct links to OpenAPI specs in JSON and YAML formats.
    humanURL: https://apis.guru/api-doc
    baseURL: https://api.apis.guru/v2
