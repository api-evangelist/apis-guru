  - type: Features
    data:
      - name: OpenAPI Directory
        description: >-
          Comprehensive directory of over 2,500 public API definitions in
          OpenAPI 2.0 and 3.x format, updated weekly from original sources.
      - name: Format Conversion
        description: >-
          Converts various API description formats (RAML, Google Discovery,
          AWS, etc.) to OpenAPI 3.0 standard for consistency and compatibility.
      - name: Quality Control
        description: >-
          Corrects errors in approximately 80% of API definitions and validates
          all specifications before inclusion in the directory.
      - name: AsyncAPI Directory
        description: >-
          Companion directory of asynchronous API specifications in AsyncAPI
          format for event-driven and message-based APIs.
      - name: GraphQL Voyager
        description: >-
          Visual tool that represents any GraphQL API as an interactive graph,
          making schema exploration intuitive and visual.
      - name: REST API Access
        description: >-
          Public REST API at api.apis.guru/v2 for programmatic access to the
          directory, metrics, provider lists, and individual API specs.
      - name: RSS Feeds
        description: >-
          RSS feeds for both newly added and recently updated API definitions,
          allowing developers to stay current with directory changes.
      - name: Metadata Enrichment
        description: >-
          Enriches API definitions with logos, categories, provider names, and
          other metadata to improve discoverability and browsability.
  - type: UseCases
    data:
      - name: API Discovery
        description: >-
          Developers can search and browse the directory to discover public
          APIs across thousands of providers by category, provider, or keyword.
      - name: SDK Generation
        description: >-
          OpenAPI specs from the directory can be used with tools like
          Microsoft Kiota and Speakeasy to generate API client SDKs.
      - name: API Documentation
        description: >-
          ReDoc and other documentation tools use the directory specs to
          generate beautiful, interactive API documentation automatically.
      - name: API Testing
        description: >-
          HTTP Toolkit and other testing tools leverage the directory for
          debugging and mocking API requests against standardized specs.
      - name: Schema Exploration
        description: >-
          GraphQL Voyager allows teams to visually explore GraphQL schema
          relationships to understand API structure quickly.
      - name: API Catalog Building
        description: >-
          Organizations can use the directory as a foundation for building
          their own internal API catalogs and governance programs.
  - type: Integrations
    data:
      - name: HTTP Toolkit
        description: >-
          HTTP debugging and testing platform that integrates with API
          definitions from the APIs.guru directory for request interception.
      - name: Microsoft Kiota
        description: >-
          Microsoft's API client generator that uses OpenAPI specs from
          APIs.guru to generate typed API clients in multiple languages.
      - name: Speakeasy
        description: >-
          SDK generation platform that pulls OpenAPI definitions from the
          directory to generate production-ready SDKs for API providers.
      - name: ReDoc
        description: >-
          API documentation generation tool that uses OpenAPI specs from
          APIs.guru to create beautiful, customizable documentation sites.
      - name: Open Collective
        description: >-
          Community funding platform where APIs.guru receives financial support
          from sponsors who benefit from the open directory.
